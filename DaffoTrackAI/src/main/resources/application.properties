spring.application.name=DaffoTrackAI
server.port=8081

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/daffotrack_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Hibernate / JPA Properties (অটোমেটিক টেবিল তৈরি করার জন্য)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OpenAI server-side configuration. Do not expose this key in the frontend.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.5}
openai.responses-url=https://api.openai.com/v1/responses

# Groq server-side configuration. Recommended for the free-tier demo.
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.chat-url=https://api.groq.com/openai/v1/chat/completions
