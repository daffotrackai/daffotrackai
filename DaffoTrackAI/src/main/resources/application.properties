spring.application.name=DaffoTrackAI
server.port=8081

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/daffotrack_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# Hibernate / JPA Properties (অটোমেটিক টেবিল তৈরি করার জন্য)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OpenAI (ChatGPT) API - Get it from: https://platform.openai.com/api-keys
openai.api-key=
openai.model=gpt-4o-mini
openai.responses-url=https://api.openai.com/v1/chat/completions

# Groq API (Free Tier) - Get it from: https://console.groq.com/keys
groq.api-key=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
groq.model=llama-3.3-70b-versatile
